<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>register</title>
</head>
<body>

    <h2>register</h2>

    <form>
        <label for="name">name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="surname">second name:</label>
        <input type="text" id="surname" name="surname"><br><br>

        <label for="age">age:</label>
        <input type="number" id="age" name="age"><br><br>

        <p>Dogs breed:</p>

        <input type="radio" id="labrador" name="dog" value="Labrador">
        <label for="labrador">Labrador</label><br>

        <input type="radio" id="bulldog" name="dog" value="Bulldog">
        <label for="bulldog">Bulldog</label><br>

        <input type="radio" id="poodle" name="dog" value="Poodle">
        <label for="poodle">Poodle</label><br><br>


        <label for="movie">Choose your fav movie:</label>
        <select id="movie" name="movie">
            <option value="interstellar">Interstellar</option>
            <option value="inception">Inception</option>
            <option value="matrix">The Matrix</option>
            <option value="avengers">Avengers</option>
        </select><br><br>


        <input type="submit" value="register">

    </form>

</body>
